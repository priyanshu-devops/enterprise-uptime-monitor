name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @uptime/shared build
          pnpm --filter @uptime/database build
          pnpm --filter @uptime/supabase build
          pnpm --filter @uptime/gsheets build

      - name: Build monitor
        run: pnpm --filter @uptime/monitor build

      - name: Build backend
        run: pnpm --filter @uptime/backend build

      - name: Build frontend
        run: pnpm --filter frontend build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://uptime-backend.onrender.com
          NEXT_PUBLIC_PAGES_BASE_URL: https://example.github.io/uptime-storage

      - name: Test
        run: pnpm -r test
