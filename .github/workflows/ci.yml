name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build monitor
        run: pnpm run build:monitor

      - name: Build backend
        run: pnpm run build:backend

      - name: Build frontend
        run: pnpm --filter frontend build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://uptime-backend.onrender.com
          NEXT_PUBLIC_PAGES_BASE_URL: https://example.github.io/uptime-storage

      - name: Test
        run: pnpm -r test
